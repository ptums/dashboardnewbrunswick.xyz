name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (tsc --noEmit)
        run: pnpm --filter api typecheck

  deploy:
    name: Migrate & Deploy to DigitalOcean
    needs: typecheck
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test database connection
        working-directory: apps/api
        run: |
          node -e "
          const {Client} = require('pg');
          const c = new Client({connectionString: process.env.DATABASE_URL});
          c.connect()
            .then(() => c.query('SELECT current_user, version()'))
            .then(r => { console.log('Connected:', JSON.stringify(r.rows[0])); return c.end(); })
            .catch(e => { console.error('FAILED:', e.message, e.code); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push database schema
        run: pnpm --filter api db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NO_COLOR: '1'

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }}
